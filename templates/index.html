<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Academic Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 95vh; }
        .app-window { width: 100%; max-width: 600px; background: #1e293b; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #334155; }
        .header { background: #6366f1; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .mode-select { background: #334155; color: white; border: 1px solid #475569; padding: 6px 12px; border-radius: 6px; cursor: pointer; outline: none; }
        #chat-viewport { height: 380px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #0f172a; }
        .bubble { padding: 12px 16px; border-radius: 8px; max-width: 85%; word-wrap: break-word; font-size: 0.95rem; white-space: pre-line; }
        .user-bubble { background: #38bdf8; color: #0f172a; align-self: flex-end; font-weight: 500; }
        .bot-bubble { background: #1e293b; color: #f1f5f9; align-self: flex-start; border: 1px solid #334155; }
        .input-bar { display: flex; padding: 15px; background: #1e293b; border-top: 1px solid #334155; }
        #message-input { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; outline: none; }
        .action-btn { background: #6366f1; color: white; border: none; padding: 0 22px; margin-left: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .action-btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="app-window">
        <div class="header">
            <span>⚙️ CodeExplainer & Tutor Suite</span>
            <select id="app-mode" class="mode-select">
                <option value="general">📚 General Chat</option>
                <option value="explain">💻 Code Explainer</option>
            </select>
        </div>
        <div id="chat-viewport">
            <div class="bubble bot-bubble"><b>System:</b> Hub active. Switch workspace modes above to analyze application builds or ask concepts.</div>
        </div>
        <div class="input-bar">
            <input type="text" id="message-input" placeholder="Type a concept query or paste a snippet..." onkeypress="if(event.key==='Enter') dispatchMessage()">
            <button class="action-btn" onclick="dispatchMessage()">Submit</button>
        </div>
    </div>

    <script>
        async function dispatchMessage() {
            const field = document.getElementById('message-input');
            const view = document.getElementById('chat-viewport');
            const mode = document.getElementById('app-mode').value;
            const query = field.value.trim();
            if (!query) return;

            view.innerHTML += `<div class="bubble user-bubble"><b>You:</b> ${query}</div>`;
            field.value = '';
            view.scrollTop = view.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: query, mode: mode })
                });
                const payload = await response.json();
                view.innerHTML += `<div class="bubble bot-bubble"><b>AI:</b> ${payload.reply}</div>`;
            } catch (error) {
                view.innerHTML += `<div class="bubble bot-bubble" style="color:#ef4444;"><b>System:</b> Network frame dispatch failed.</div>`;
            }
            view.scrollTop = view.scrollHeight;
        }
    </script>
</body>
</html>
